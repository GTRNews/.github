name: Question
description: Ask a question about the project
title: "[QUESTION] "
labels: ["question"]
assignees: []
body:
  - type: input
    id: summary
    attributes:
      label: Question Summary
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Details
      description: Provide context and what you've tried
    validations:
      required: true

  - type: textarea
    id: related
    attributes:
      label: Related Links
      placeholder: Docs, issues, PRs
