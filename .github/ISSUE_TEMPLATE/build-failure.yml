name: "Build Failure"
description: Build system failure
title: "[BUILD] "
labels: ["build"]
body:
  - type: dropdown
    id: system
    attributes:
      label: Build System
      options:
        - GitHub Actions
        - Azure DevOps
        - Local
        - Docker
        - Other
    validations:
      required: true

  - type: input
    id: target
    attributes:
      label: Build Target
      placeholder: linux-x64 / release / docker

  - type: textarea
    id: error
    attributes:
      label: Error
      render: shell
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps

  - type: textarea
    id: environment
    attributes:
      label: Environment
